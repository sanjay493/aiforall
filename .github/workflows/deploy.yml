name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build backend image
        run: |
          docker build -t ${{ secrets.DOCKER_USER }}/aiforall-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USER }}/aiforall-backend:latest

      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKER_USER }}/aiforall-frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USER }}/aiforall-frontend:latest

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Oracle VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd app
            docker compose pull
            docker compose up -d --force-recreate --remove-orphans